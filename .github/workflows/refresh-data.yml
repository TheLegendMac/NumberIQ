name: Refresh drawing data

# Ingest cannot run on the Worker: parsing ~87k drawings out of the Lottery's
# PDFs is far beyond a Worker's CPU budget, and an open sync endpoint would let
# anyone point the deployment at the Lottery's servers. So the ingest runs here
# instead, on a schedule, and publishes only the result to D1.
on:
  schedule:
    # Florida's history PDFs can update well after the overnight drawings. Run
    # at 15:15 UTC (10:15am EST / 11:15am EDT), then retry four hours later in
    # case the official publication is delayed. Both runs are idempotent.
    # Minute 15 also avoids GitHub Actions' busiest start-of-hour window.
    - cron: '15 15 * * *'
    - cron: '15 19 * * *'
  workflow_dispatch:
    inputs:
      full:
        description: 'Publish the entire history instead of just recent drawings'
        type: boolean
        default: false

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Downloads each game's official history PDF once and parses it. Failures
      # are reported per game rather than aborting, so one bad source file does
      # not block the others.
      - name: Ingest official history
        run: npx tsx server/src/cli/seed.ts | tee ingest.log

      - name: Fail if every game failed
        run: |
          if grep -q "FAILED" ingest.log && ! grep -q "added" ingest.log; then
            echo "::error::Every game failed to ingest — the source format may have changed."
            exit 1
          fi
          if grep -q "FAILED" ingest.log; then
            echo "::warning::Some games failed to ingest; see the log above."
          fi

      # Only recent drawings are published. The guarded upsert leaves unchanged
      # rows alone while still applying a late official correction.
      - name: Export drawings for D1
        run: |
          if [ "${{ inputs.full }}" = "true" ]; then
            npx tsx server/src/cli/export-d1.ts
          else
            npx tsx server/src/cli/export-d1.ts --since=45
          fi

      - name: Publish to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ ! -s data/d1-seed.sql ]; then
            echo "Nothing new to publish."
            exit 0
          fi
          npx wrangler d1 execute numberiq --remote --file=./data/d1-seed.sql --yes

      # Confirm the deployment actually reflects every freshly ingested
      # game/slot watermark, rather than trusting that the push reported success.
      - name: Verify the live deployment
        run: |
          sleep 5
          HEALTH=$(curl -sS --max-time 30 https://numberiq.trappers-edge.workers.dev/api/health)
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"ok":true' || {
            echo "::error::Health check failed after publishing."
            exit 1
          }
          npx tsx server/src/cli/verify-live-watermarks.ts

      - name: Summary
        if: always()
        run: |
          {
            echo "### Drawing data refresh"
            echo ""
            echo '```'
            cat ingest.log 2>/dev/null || echo "no ingest log"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
